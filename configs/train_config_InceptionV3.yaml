# ==============================================================================
# train_config_InceptionV3.yaml
# ------------------------------------------------------------------------------
# Training configuration for InceptionV3.
#
# IMPORTANT — input size:
#   InceptionV3 REQUIRES 299×299 images. Using 224×224 produces incorrect
#   feature map dimensions and significantly degrades performance.
#   The value below (299) is enforced in train.py via MODEL_INPUT_SIZES and
#   cannot be accidentally overridden by forgetting to update this file,
#   but it is set here for clarity and documentation.
#
# Usage:
#   python scripts/train.py --model inceptionv3 --config configs/train_config_InceptionV3.yaml
# ==============================================================================


# ------------------------------------------------------------------------------
# Dataset paths
# ------------------------------------------------------------------------------
paths:
  train:        "D:/JCA/07-Data/01_Concrete/03-experiment_datasets/A/A3/01-train/"
  val:          "D:/JCA/07-Data/01_Concrete/03-experiment_datasets/A/A3/02-validation/"
  test:         "D:/JCA/07-Data/01_Concrete/03-experiment_datasets/A/A3/03-test/"
  saved_models: "saved_models/"
  results:      "results/training/"


# ------------------------------------------------------------------------------
# Dataset classes
# ------------------------------------------------------------------------------
dataset:
  class_names: ["crack", "efflorescence", "spalling", "undamaged"]
  num_classes: 4


# ------------------------------------------------------------------------------
# Model settings
# ------------------------------------------------------------------------------
# input_size: 299 is the REQUIRED input for InceptionV3. Do not change this.
#   train.py enforces it via MODEL_INPUT_SIZES regardless, but it is set here
#   explicitly so the config is self-documenting.
#
# freeze_backbone: true — only the final fc layer is trained.
#   The AuxLogits branch is disabled at load time (model.aux_logits = False),
#   so the model behaves as a standard single-output classifier.
model:
  name: "inceptionv3"
  input_size: 299        # DO NOT change — InceptionV3 requires exactly 299
  freeze_backbone: true


# ------------------------------------------------------------------------------
# Training hyperparameters
# ------------------------------------------------------------------------------
# batch_size: 16 instead of 32.
#   InceptionV3 is a larger model than VGG16 or ResNet50, and its 299×299
#   input images consume more GPU memory per batch. If you get an OOM
#   (out of memory) error on your GTX 1060 (6GB VRAM), reduce to 8.
#
# learning_rate: 0.00001 — same as the other models.
#   With a frozen backbone we are only fine-tuning the final layer,
#   so a small learning rate is appropriate.
#
# epochs: 50 — same as the others. Increase to 70 if the model has not
#   converged by then (check the loss curve).
training:
  batch_size: 16          # Reduced from 32 due to larger 299×299 input size
  learning_rate: 0.00001
  weight_decay: 0.001
  epochs: 50


# ------------------------------------------------------------------------------
# Early stopping
# ------------------------------------------------------------------------------
early_stopping:
  enabled: true
  patience: 10


# ------------------------------------------------------------------------------
# ImageNet normalisation constants
# ------------------------------------------------------------------------------
# These are the same ImageNet mean and std values used for all other models.
# InceptionV3 was pretrained on the same ImageNet dataset, so the same
# normalisation statistics apply.
normalisation:
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]


# ------------------------------------------------------------------------------
# Data augmentation
# ------------------------------------------------------------------------------
augmentation:
  enabled: True
  horizontal_flip: true
  vertical_flip: false
  rotation_degrees: 15
  colour_jitter: true
  colour_jitter_strength: 0.2
