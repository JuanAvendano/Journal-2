# ==============================================================================
# train_config_EfficientNetB0.yaml
# ------------------------------------------------------------------------------
# Training configuration for EfficientNet-B0.
#
# Usage:
#   python scripts/train.py --model efficientnet_b0 --config configs/train_config_EfficientNetB0.yaml
# ==============================================================================


# ------------------------------------------------------------------------------
# Dataset paths
# ------------------------------------------------------------------------------
paths:
  train:        "D:/JCA/07-Data/01_Concrete/03-experiment_datasets/A/A3/01-train/"
  val:          "D:/JCA/07-Data/01_Concrete/03-experiment_datasets/A/A3/02-validation/"
  test:         "D:/JCA/07-Data/01_Concrete/03-experiment_datasets/A/A3/03-test/"
  saved_models: "saved_models/"
  results:      "results/training/"


# ------------------------------------------------------------------------------
# Dataset classes
# ------------------------------------------------------------------------------
dataset:
  class_names: ["crack", "efflorescence", "spalling", "undamaged"]
  num_classes: 4


# ------------------------------------------------------------------------------
# Model settings
# ------------------------------------------------------------------------------
# input_size: 224 — EfficientNet-B0 uses the same standard 224×224 resolution
#   as VGG16 and ResNet50. Larger variants (B1–B7) use larger resolutions.
#
# freeze_backbone: true — only classifier[1] (the final Linear layer) is trained.
#   The Dropout layer (classifier[0]) is also kept active during training to
#   regularise the outputs of the frozen feature extractor.
model:
  name: "efficientnet_b0"
  input_size: 224
  freeze_backbone: true


# ------------------------------------------------------------------------------
# Training hyperparameters
# ------------------------------------------------------------------------------
# batch_size: 32 — EfficientNet-B0 is a compact model and fits comfortably in
#   your GTX 1060's 6GB VRAM at batch size 32 with 224×224 inputs.
#
# learning_rate: 0.00001 — same as the other models.
#
# epochs: 50 — start here. EfficientNet-B0 typically converges faster than
#   ResNet50 because it is more parameter-efficient, so early stopping may
#   trigger before epoch 50.
training:
  batch_size: 32
  learning_rate: 0.00001
  weight_decay: 0.001
  epochs: 50


# ------------------------------------------------------------------------------
# Early stopping
# ------------------------------------------------------------------------------
early_stopping:
  enabled: true
  patience: 10


# ------------------------------------------------------------------------------
# ImageNet normalisation constants
# ------------------------------------------------------------------------------
# EfficientNet-B0 was pretrained on ImageNet and uses the same normalisation
# statistics as VGG16, ResNet50, AlexNet, and InceptionV3.
normalisation:
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]


# ------------------------------------------------------------------------------
# Data augmentation
# ------------------------------------------------------------------------------
augmentation:
  enabled: True
  horizontal_flip: true
  vertical_flip: false
  rotation_degrees: 15
  colour_jitter: true
  colour_jitter_strength: 0.2
