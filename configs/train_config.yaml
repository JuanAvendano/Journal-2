# ==============================================================================
# train_config.yaml
# ------------------------------------------------------------------------------
# Central configuration file for training a single CNN model.
# To train a different model or experiment with different hyperparameters, you
# only need to edit this file — no Python code changes required.

# Usage:
#   python scripts/train.py --model vgg16 --config configs/train_config.yaml
# ==============================================================================


# ------------------------------------------------------------------------------
# Dataset paths
# ------------------------------------------------------------------------------
# Point these to the three folders on your machine.
# Use forward slashes or double backslashes on Windows.
# Example: C:/Users/jcac/OneDrive - KTH/Datasets/DataEnsemble/01-train
paths:
  train:      "D:/JCA/07-Data/01_Concrete/DataEnsemble_v2/01-train/"         # Folder with class subfolders for training
  val:        "D:/JCA/07-Data/01_Concrete/DataEnsemble_v2/02-validation/"    # Folder with class subfolders for validation
  test:       "D:/JCA/07-Data/01_Concrete/DataEnsemble_v2/03-test/"          # Folder with class subfolders for testing
  saved_models: "saved_models/"       # Where best.pth and last.pth are saved
  results:    "results/training/"   # Where metrics, curves, confusion matrices go


# ------------------------------------------------------------------------------
# Dataset classes
# ------------------------------------------------------------------------------
# List the class names in the same order as the subfolder names in your dataset.
# The order here determines the numeric label each class gets (0, 1, 2, 3...).
# This must be consistent across training and all ensemble methods and is CAPS sensitive.
dataset:
  class_names: ["crack", "efflorescence", "spalling", "undamaged"]
  num_classes: 4


# ------------------------------------------------------------------------------
# Model settings
# ------------------------------------------------------------------------------
# 'name' controls which architecture gets loaded by scripts/train.py.
# Supported values: "vgg16", "resnet50", "alexnet"
#
# 'input_size' is the image dimension (height = width) images are resized to
# before being fed into the model. Each architecture has a standard size:
#   - VGG16:   224
#   - ResNet50: 224
#   - AlexNet:  227
#
# 'freeze_backbone' controls transfer learning behaviour:
#   - true:  only the final classification layer is trained (faster, less data needed)
#   - false: all layers are trained (slower, needs more data)
model:
  name: "vgg16"
  input_size: 224
  freeze_backbone: true


# ------------------------------------------------------------------------------
# Training hyperparameters
# ------------------------------------------------------------------------------
# batch_size:    number of images processed together in one forward/backward pass.
#                32 is used as default. A larger size will need more GPU memory. .
# learning_rate: controls how big each weight update step is. 0.001 is standard
#                for Adam with a frozen backbone.
# epochs:        number of full passes through the training dataset.
#                Early stopping is applied if no improvement is seen.
training:
  batch_size: 32
  learning_rate: 0.0001
  epochs: 50


# ------------------------------------------------------------------------------
# Early stopping
# ------------------------------------------------------------------------------
# Stops training automatically if validation accuracy does not improve for
# 'patience' consecutive epochs. This saves time and avoids overfitting.
# Set 'enabled: false' to always run for the full number of epochs.
early_stopping:
  enabled: False
  patience: 10       # Stop after 10 epochs with no improvement


# ------------------------------------------------------------------------------
# ImageNet normalisation constants
# ------------------------------------------------------------------------------
# These mean and std values come from the ImageNet dataset, which is what all
# three models (VGG16, ResNet50, AlexNet) were originally pretrained on.
# Normalising your images with the same statistics the model was trained on
# is important for transfer learning to work well.
normalisation:
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]


# ------------------------------------------------------------------------------
# Data augmentation
# ------------------------------------------------------------------------------
# Augmentation applies random transformations to training images to artificially
# increase dataset diversity and reduce overfitting. Validation and Test sets
# are NEVER augmented — only the training set.
# Set 'enabled: false' to skip augmentation entirely.
augmentation:
  enabled: True
  horizontal_flip: true     # Randomly mirror images left-right
  vertical_flip: false      # Usually not useful for damage images
  rotation_degrees: 15      # Randomly rotate up to ±15 degrees
  colour_jitter: true       # Randomly vary brightness/contrast/saturation
  colour_jitter_strength: 0.2

# Balanced sampling approach uses weighted sampling to oversample underrepresented
# classes so each batch has roughly the same amount of images from each class.
balanced_sampling:
  enabled: True

